name: Build and Release IWYU

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      iwyu_version:
        description: 'IWYU version to build (must start with iwyu-, e.g. iwyu-0.25.0)'
        required: true
      clang_version:
        description: 'Clang version to use (optional, defaults to IWYU minor - 4)'
        required: false

# Restrict default permissions to read-only.
permissions:
  contents: read

jobs:
  build-linux:
    name: Build Linux ${{ matrix.arch }}
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'iwyu-')
    runs-on: ${{ matrix.runner }}
    container:
      image: ubuntu:22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            wget \
            git \
            patch \
            cmake \
            make \
            gcc \
            g++ \
            python3 \
            libtinfo-dev \
            zlib1g-dev \
            libzstd-dev \
            xz-utils \
            zstd

      - name: Build IWYU
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
          IWYU_INPUT_VER: ${{ github.event.inputs.iwyu_version }}
          CLANG_INPUT_VER: ${{ github.event.inputs.clang_version }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            IWYU_VER="$RELEASE_TAG_NAME"
          else
            IWYU_VER="$IWYU_INPUT_VER"
          fi
          
          if [ -n "$CLANG_INPUT_VER" ]; then
            python3 internal/build_iwyu.py --iwyu-version "$IWYU_VER" --clang-version "$CLANG_INPUT_VER"
          else
            python3 internal/build_iwyu.py --iwyu-version "$IWYU_VER"
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: iwyu-binaries-linux-${{ matrix.arch }}
          path: iwyu-*.tar.zst
          if-no-files-found: error
          retention-days: 1

  build-macos:
    name: Build macOS ${{ matrix.arch }}
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'iwyu-')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-13
          - arch: arm64
            runner: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build IWYU
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
          IWYU_INPUT_VER: ${{ github.event.inputs.iwyu_version }}
          CLANG_INPUT_VER: ${{ github.event.inputs.clang_version }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            IWYU_VER="$RELEASE_TAG_NAME"
          else
            IWYU_VER="$IWYU_INPUT_VER"
          fi
          
          if [ -n "$CLANG_INPUT_VER" ]; then
            python3 internal/build_iwyu.py --iwyu-version "$IWYU_VER" --clang-version "$CLANG_INPUT_VER"
          else
            python3 internal/build_iwyu.py --iwyu-version "$IWYU_VER"
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: iwyu-binaries-macos-${{ matrix.arch }}
          path: iwyu-*.tar.zst
          if-no-files-found: error
          retention-days: 1

  release:
    name: Upload to Release
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'iwyu-')
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Restrict write permission to only the release step
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Upload to Github Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
          IWYU_INPUT_VER: ${{ github.event.inputs.iwyu_version }}
        run: |
          # Determine the release tag name
          if [ "$EVENT_NAME" = "release" ]; then
            TAG_NAME="$RELEASE_TAG_NAME"
          else
            TAG_NAME="$IWYU_INPUT_VER"
          fi
          
          # Enforce that the release tag strictly starts with 'iwyu-'
          if [[ ! "$TAG_NAME" =~ ^iwyu- ]]; then
            echo "Error: Tag name '$TAG_NAME' must start with 'iwyu-' prefix (e.g. iwyu-0.25.0)."
            exit 1
          fi
          
          echo "Targeting release/tag: $TAG_NAME"
          
          # If workflow_dispatch and the release draft/tag doesn't exist, create a draft release first
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME not found. Creating a draft release..."
            gh release create "$TAG_NAME" --draft --title "Release $TAG_NAME" --notes "Automated build of Include What You Use."
          fi
          
          # Upload files using gh CLI
          find artifacts -type f -name "iwyu-*.tar.zst" -print0 | xargs -0 -I {} gh release upload "$TAG_NAME" "{}" --clobber
